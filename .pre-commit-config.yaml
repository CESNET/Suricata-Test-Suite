repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.4.4
    hooks:
      # Run the linter to catch syntax errors, unused imports, etc.
      - id: ruff
        args: [ --fix ]
      # Run the formatter to enforce code style (black-equivalent)
      - id: ruff-format
